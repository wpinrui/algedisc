<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algedisc</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Algedisc</h1>
    <div class="header-right">
      <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">&#9788;</button>
      <div class="tab-bar">
        <div class="tab active">Workspace</div>
        <div class="tab" data-disabled>Multiplication Frame</div>
      </div>
    </div>
  </header>

  <main class="main-area">
    <canvas id="workspace-canvas"></canvas>
  </main>

  <footer>
    <span id="status-left"></span>
    <span id="status-right"></span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
